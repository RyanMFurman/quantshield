name: Python CI

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "requirements.txt"
      - "README.md"
      - ".github/workflows/python-ci.yml"
  push:
    branches:
      - main
      - "feature/**"
    paths:
      - "src/**"
      - "tests/**"
      - "requirements.txt"
      - "README.md"
      - ".github/workflows/python-ci.yml"

jobs:
  api-smoke-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API tests
        run: python -m unittest discover -s tests -v

      - name: Import dashboard module
        run: python -c "import src.api.dashboard"
